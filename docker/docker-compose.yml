version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: novapass-db
    environment:
      POSTGRES_DB: novapass
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docs/database-schema/schema-design.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks: [novapass]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: novapass-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    networks: [novapass]

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: novapass-backend
    environment:
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/novapass
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    networks: [novapass]
    restart: unless-stopped

  web:
    build:
      context: ../web-app
      dockerfile: Dockerfile
    container_name: novapass-web
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost/api}
    networks: [novapass]
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: novapass-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on: [backend, web]
    networks: [novapass]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  novapass:
    driver: bridge
