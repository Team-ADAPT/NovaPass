spring:
  jpa:
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: 900000
      refresh-expiration: 604800000

logging:
  level:
    com.novapass: INFO
    org.springframework: WARN
    org.hibernate: WARN

server:
  error:
    include-message: never
    include-binding-errors: never
