name: NovaPass CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: mvn clean install
    
    - name: Run Tests
      run: mvn test
    
    - name: Build Backend
      run: cd backend && mvn package -DskipTests
    
    - name: Build Desktop Client
      run: cd desktop-client && mvn package -DskipTests
    
    - name: Upload Backend Artifact
      uses: actions/upload-artifact@v3
      with:
        name: backend-jar
        path: backend/target/*.jar
    
    - name: Upload Desktop Client Artifact
      uses: actions/upload-artifact@v3
      with:
        name: desktop-client-jar
        path: desktop-client/target/*.jar

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker Image
      run: docker build -f docker/Dockerfile-backend -t novapass-backend:latest .
    
    - name: Save Docker Image
      run: docker save novapass-backend:latest | gzip > novapass-backend.tar.gz
    
    - name: Upload Docker Image
      uses: actions/upload-artifact@v3
      with:
        name: docker-image
        path: novapass-backend.tar.gz
